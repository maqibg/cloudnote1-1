name = "cloudnote1-1"
main = "src/index.ts"
compatibility_date = "2026-03-28"
compatibility_flags = ["nodejs_compat"]

# 环境变量
[vars]
PATH_MIN_LENGTH = "1"
PATH_MAX_LENGTH = "20"
RATE_LIMIT_PER_MINUTE = "60"
SESSION_DURATION = "86400"

# D1 数据库绑定（Deploy Button 会自动创建并填充 database_id）
[[d1_databases]]
binding = "DB"
database_name = "cloudnote-db"

# KV 命名空间绑定（Deploy Button 会自动创建并填充 id）
[[kv_namespaces]]
binding = "CACHE"

# R2 存储桶绑定（Deploy Button 会自动创建）
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cloudnote-storage"
